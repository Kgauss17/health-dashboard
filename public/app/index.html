<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Carte Électorale — Province de Figuig</title>
  <style>
    html,body{height:100%;margin:0;padding:0;overflow:hidden;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#f4f6fa;color:#0f172a}
    .app{height:100vh;display:flex;flex-direction:column}
    .header{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:10px 18px;background:#fff;box-shadow:0 2px 8px rgba(15,23,42,.06);z-index:10}
    .header-left,.header-right{display:flex;align-items:center;gap:12px}
    .logo{height:38px;width:auto}
    .title{font-weight:700;font-size:16px;color:#0f172a}
    .subtitle{font-size:11px;color:#64748b;margin-top:2px}
    .axis-nav{display:flex;gap:6px}
    .axis-btn{padding:8px 16px;border-radius:999px;text-decoration:none;color:#475569;font-size:13px;font-weight:500;background:#f1f5f9;transition:all .15s;cursor:pointer;border:0}
    .axis-btn:hover{background:#e2e8f0}
    .axis-btn.is-active{background:linear-gradient(135deg,#2563eb,#0ea5e9);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.3)}
    .module-host{flex:1;min-height:0;overflow:hidden;position:relative}
    .module-frame{width:100%;height:100%;border:0;display:block;background:transparent}
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-left">
        <img class="logo" src="assets/logos/ministere.png" alt="Ministère" onerror="this.style.display='none'"/>
        <div>
          <div class="title">Tableau de Bord Électoral — Province de Figuig</div>
          <div class="subtitle">Carte interactive des bureaux de vote, électeurs et circonscriptions</div>
        </div>
      </div>
      <nav class="axis-nav">
        <a class="axis-btn is-active" data-axis="electorale" href="#electorale">Élections</a>
      </nav>
      <div class="header-right">
        <img class="logo" src="assets/logos/maroc.png" alt="Maroc" onerror="this.style.display='none'"/>
      </div>
    </header>
    <main class="module-host">
      <iframe id="moduleFrame" class="module-frame" title="Carte électorale" src="modules/electorale/index.html"></iframe>
    </main>
  </div>
  <script>
    const frame = document.getElementById('moduleFrame');
    frame.addEventListener('load', () => {
      setTimeout(() => { try { frame.contentWindow.postMessage({type:'HUB:VISIBLE'}, '*'); } catch(e){} }, 200);
    });
  </script>
</body>
</html>
